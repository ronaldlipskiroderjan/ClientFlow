<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos | ClientFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-arctic-gray">
<nav class="navbar navbar-light bg-white border-bottom px-3 sticky-top">
    <div class="d-flex align-items-center w-100">
        <a href="dashboard_agency.html" class="btn btn-text-custom me-3 p-0"><i class="fa-solid fa-arrow-left fs-5 text-navy-blue"></i></a>
        <span class="navbar-brand mb-0 h1 fw-bold text-navy-blue">Meus Projetos e Links</span>
    </div>
</nav>

<div class="container py-4">
    <div class="card card-custom border-0 p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Projeto</th>
                        <th>Cliente Vinculado</th>
                        <th>Itens</th>
                        <th>Status</th>
                        <th>Link</th>
                                                <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="checklistsTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reviewModalTitle">Revisão de Itens</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted" id="reviewModalClient"></p>
                <div id="reviewItemsList"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>

<!-- Floating Chat Widget -->
<div class="floating-chat-widget d-none shadow-lg" id="floatingChatWidget">
    <div class="floating-chat-header text-white p-3 d-flex justify-content-between align-items-center rounded-top-custom">
        <div>
            <h6 class="mb-0 fw-bold" id="widgetChatTitle">Mensagens</h6>
            <small class="opacity-75 d-block" id="widgetChatClient" style="font-size: 0.75rem;">Selecione o chat</small>
        </div>
        <button type="button" class="btn-close btn-close-white" id="closeFloatingChat" aria-label="Close"></button>
    </div>
    
    <div class="chat-box p-3" id="widgetChatBox">
        <div class="d-flex h-100 align-items-center justify-content-center text-center px-3">
            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
        </div>
    </div>
    
    <div class="chat-input-area p-2 rounded-bottom-custom">
        <form id="widgetMessageForm" class="d-flex gap-2 m-0 h-100 align-items-center">
            <input type="text" id="widgetMessageInput" class="form-control bg-light border-0 px-3 h-100" placeholder="Digite sua mensagem..." required autocomplete="off" style="font-size: 0.95rem;">
            <button type="submit" class="btn btn-primary-custom rounded d-flex align-items-center justify-content-center px-3 h-100" id="widgetBtnSend">
                <i class="fa-solid fa-paper-plane ms-reverse-1"></i>
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js?v=2"></script>
<script src="../js/api.js?v=2"></script>
<script src="../js/checklists.js?v=3"></script>
</body>
</html>
