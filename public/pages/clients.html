<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | ClientFlow</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-arctic-gray">

<div class="d-flex app-shell">
    <div id="sidebar-container"></div>

    <main class="main-content flex-grow-1 min-vh-100">
        <div class="container-fluid py-4 px-3 px-lg-4">
            <section class="page-header-card mb-4">
                <div class="d-flex flex-column flex-xl-row align-items-xl-center justify-content-between gap-3">
                    <div>
                        <h1 class="h3 fw-bold mb-1 text-navy-blue">Base de Clientes</h1>
                        <p class="text-muted mb-0">Gerencie sua carteira de clientes com histórico claro e ações rápidas.</p>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary-custom" id="btnNovoCliente" onclick="window.location.href='form_builder.html'">
                            <i class="fa-solid fa-user-plus me-2"></i>Adicionar via Link
                        </button>
                    </div>
                </div>
            </section>

            <div class="surface-panel p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-premium table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Nome</th>
                                <th>Empresa</th>
                                <th>E-mail</th>
                                <th>Data de cadastro</th>
                                <th class="text-end pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                            <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="surface-panel mt-4 p-4">
                <div class="d-flex align-items-start gap-3">
                    <div class="text-primary fs-5"><i class="fas fa-circle-info"></i></div>
                    <p class="text-muted mb-0">
                        Clientes são vinculados automaticamente quando se cadastram pelo link de um projeto.
                    </p>
                </div>
            </div>
        </div>

        <footer class="footer text-center mt-auto py-4 bg-white border-top">
          <div class="container text-center">
            <div class="text-muted small">
                &copy; 2026 ClientFlow. Todos os direitos reservados.
            </div>
          </div>
        </footer>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/clients.js"></script>
</body>
</html>
