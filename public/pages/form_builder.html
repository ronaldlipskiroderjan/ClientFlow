<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Formulário | ClientFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-arctic-gray">
<nav class="navbar navbar-light bg-white border-bottom px-3 sticky-top">
    <div class="d-flex align-items-center w-100">
        <a href="dashboard_agency.html" class="btn btn-text-custom me-3 p-0"><i class="fa-solid fa-arrow-left fs-5 text-navy-blue"></i></a>
        <span class="navbar-brand mb-0 h1 fw-bold text-navy-blue">Criar Formulário de Projeto</span>
    </div>
</nav>

<div class="container py-4">
    <div class="card card-custom border-0 p-4 mb-4">
        <form id="formBuilderForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Título do Projeto</label>
                <input type="text" class="form-control" id="projectTitle" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Descrição</label>
                <textarea class="form-control" id="projectDescription" rows="3"></textarea>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2">
                <h5 class="fw-bold text-navy-blue mb-0">Itens Solicitados</h5>
                <button type="button" class="btn btn-outline-custom" id="addFieldBtn"><i class="fa-solid fa-plus me-1"></i> Adicionar Item</button>
            </div>

            <div id="fieldsContainer" class="d-flex flex-column gap-3 mb-4"></div>

            <button type="submit" class="btn btn-primary-custom">Gerar Link para Cliente</button>
        </form>
    </div>

    <div class="card card-custom border-0 p-4 d-none" id="linkResultCard">
        <h5 class="fw-bold text-navy-blue">Link de Cadastro Vinculado</h5>
        <p class="text-muted mb-2">Envie este link para o cliente se cadastrar e ficar vinculado ao projeto automaticamente:</p>
        <div class="input-group">
            <input type="text" id="projectLinkInput" class="form-control" readonly>
            <button class="btn btn-outline-custom" type="button" id="copyLinkBtn">Copiar</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/form_builder.js"></script>
</body>
</html>
