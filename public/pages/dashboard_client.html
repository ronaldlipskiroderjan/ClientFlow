<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cliente | ClientFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-arctic-gray">

<!-- Sidebar Offcanvas -->
<div class="offcanvas offcanvas-start sidebar-offcanvas text-white" tabindex="-1" id="clientSidebar" aria-labelledby="clientSidebarLabel">
  <div class="offcanvas-header border-bottom border-secondary">
    <h5 class="offcanvas-title fw-bold" id="clientSidebarLabel">
        <i class="fa-solid fa-layer-group text-primary me-2"></i> ClientFlow
    </h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column">
    <ul class="nav flex-column mb-auto">
      <li class="nav-item">
        <a href="dashboard_client.html" class="nav-link active">
          <i class="fa-solid fa-list-check me-2"></i> Minhas Tarefas
        </a>
      </li>
    </ul>
    
    <hr class="border-secondary">
    <div class="dropdown">
      <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownClient" data-bs-toggle="dropdown" aria-expanded="false">
        <img data-user-avatar src="https://ui-avatars.com/api/?name=ClientFlow&background=E63946&color=fff" alt="" width="32" height="32" class="rounded-circle me-2">
        <strong data-user-display-name></strong>
      </a>
      <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownClient">
        <li><a class="dropdown-item text-danger js-logout-link" href="../../index.html">Sair Seguramente</a></li>
      </ul>
    </div>
  </div>
</div>

<!-- App Topnavbar -->
<nav class="navbar navbar-light bg-white border-bottom px-3 sticky-top">
    <div class="d-flex align-items-center w-100">
        <button class="btn btn-text-custom me-3 p-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#clientSidebar" aria-controls="clientSidebar">
            <i class="fa-solid fa-bars fs-4 text-navy-blue"></i>
        </button>
        <span class="navbar-brand mb-0 h1 fw-bold text-navy-blue d-none d-md-block">Minhas Tarefas</span>
        
        <div class="ms-auto d-flex align-items-center">
            <span class="text-muted d-none d-sm-block" data-user-greeting>Olá, <span class="fw-bold text-navy-blue"></span></span>
        </div>
    </div>
</nav>

<div class="container-fluid py-4 bg-arctic-gray min-vh-100">
    <div class="row g-4 justify-content-center">
        <div class="col-lg-8" id="tasks-container">
            <h4 class="fw-bold text-navy-blue mb-4">Minhas Tarefas</h4>
            
            <!-- Tasks will be injected here -->
            <div class="text-center py-5 text-muted" id="empty-tasks">
                <i class="fa-solid fa-mug-hot fs-1 mb-3 opacity-25"></i>
                <h5>Tudo pronto por aqui!</h5>
                <p>Você não tem documentos ou formulários pendentes no momento.</p>
            </div>
        </div>
        
        <div class="col-lg-4">
            <div class="card card-custom border-0 sticky-top" style="top: 80px; height: 500px;">
                <div class="card-header bg-navy-blue text-white rounded-top border-0">
                    <h6 class="mb-0 py-1"><i class="fa-solid fa-comments me-2"></i> Chat com a Agência</h6>
                </div>
                <div class="card-body bg-light overflow-auto d-flex flex-column gap-3">
                    <div class="text-muted text-center text-sm py-4">Histórico de mensagens aparecerá aqui.</div>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <div class="input-group">
                        <input type="text" class="form-control bg-light border-0" placeholder="Digite uma mensagem...">
                        <button class="btn btn-primary-custom"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer text-center mt-auto py-4">
  <div class="container text-center">
    <div class="border-top pt-3 text-muted text-sm">
        &copy; 2024 ClientFlow. Todos os direitos reservados.
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/dashboard_client.js"></script>
</body>
</html>
