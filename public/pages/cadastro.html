<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | ClientFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="../index.html">
      <i class="fa-solid fa-layer-group text-primary me-2"></i> ClientFlow </a>
  </div>
</nav>

<div class="main-content">
<div class="container py-5">
    <div class="row w-100 justify-content-center m-0">
        <div class="col-md-8 col-lg-6">
            <div class="card card-custom p-5 border-0 shadow-lg">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-navy-blue">Comece grátis</h2>
                    <p class="text-muted">Descomplique o onboarding de seus clientes</p>
                </div>

                <div class="alert alert-info border-0 mb-4">
                    Esta entrega contempla apenas cadastro e login de cliente.
                </div>

                <div class="tab-content" id="registerTabsContent">
                    <!-- Cliente PF -->
                    <div class="tab-pane fade show active" id="client" role="tabpanel" aria-labelledby="client-tab">
                        <form>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Nome Completo</label>
                                <input type="text" name="full_name" class="form-control bg-light border-0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">CPF</label>
                                <input type="text" name="cpf" class="form-control bg-light border-0" placeholder="000.000.000-00" maxlength="14" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Data de Nascimento</label>
                                <input type="date" name="birth_date" class="form-control bg-light border-0" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">Número para Contato</label>
                                <input type="tel" name="phone" class="form-control bg-light border-0" placeholder="(00) 00000-0000" maxlength="15" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold">E-mail para Login</label>
                                <input type="email" name="email" class="form-control bg-light border-0" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted fw-semibold">Senha</label>
                                <input type="password" name="password" class="form-control bg-light border-0" minlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-3">Criar Conta Cliente</button>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-3">
                    <span class="text-muted">Já tem uma conta?</span> <a href="login.html" class="text-primary fw-semibold">Fazer Login</a>
                </div>

            </div>
        </div>
    </div>
</div>
</div>

<footer class="footer text-center mt-auto py-4">
  <div class="container text-center">
    <div class="border-top pt-3 text-muted text-sm">
        &copy; 2026 ClientFlow. Todos os direitos reservados.
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cadastro.js"></script>
</body>
</html>
