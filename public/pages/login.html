<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ClientFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="../index.html">
      <i class="fa-solid fa-layer-group text-primary me-2"></i> ClientFlow
    </a>
  </div>
</nav>

<div class="main-content">
<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 80vh;">
    <div class="card card-custom p-5 border-0 shadow-lg" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-navy-blue">Bem-vindo(a) de volta</h2>
            <p class="text-muted">Acesse seu painel ClientFlow</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label text-muted fw-semibold">E-mail de acesso</label>
                <input type="email" class="form-control form-control-lg bg-light border-0" id="email" name="email" placeholder="nome@empresa.com" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-muted fw-semibold">Senha</label>
                <input type="password" class="form-control form-control-lg bg-light border-0" id="password" name="password" placeholder="••••••••" required>
                <div class="text-end mt-1">
                    <button type="button" class="btn btn-link p-0 text-primary text-sm text-decoration-none" disabled aria-disabled="true">Esqueceu a senha?</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 btn-lg mb-3">Entrar no painel</button>
            <div class="text-center">
                <span class="text-muted">Ainda não tem conta?</span> <a href="cadastro.html" class="text-primary fw-semibold">Cadastre-se grátis</a>
            </div>
        </form>
    </div>
</div>
</div>

<footer class="footer text-center mt-auto py-4">
  <div class="container text-center">
    <div class="border-top pt-3 text-muted text-sm">
        &copy; 2026 ClientFlow. Todos os direitos reservados.
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/api.js?v=2"></script>
<script src="../js/login.js?v=2"></script>
</body>
</html>
