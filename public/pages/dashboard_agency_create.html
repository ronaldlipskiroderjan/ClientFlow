<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Checklist | ClientFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0 p-4">

        <h4 class="fw-semibold mb-3">Criar Checklist</h4>

        <!-- Título e Descrição -->
        <input type="text" id="checklist_titulo" class="form-control mb-3" placeholder="Título do projeto">
        <input type="text" id="checklist_descricao" class="form-control mb-4" placeholder="Descrição">

        <!-- Adicionar Item -->
        <div class="row g-2 mb-2">
          <div class="col-md-4"><input type="text" id="item_nome" class="form-control" placeholder="Nome do item"></div>
          <div class="col-md-4"><input type="text" id="item_desc" class="form-control" placeholder="Descrição"></div>
          <div class="col-md-3">
            <select id="item_tipo" class="form-select">
              <option value="text">Texto</option>
              <option value="long_text">Texto longo</option>
              <option value="file">Arquivo</option>
              <option value="image">Imagem</option>
              <option value="url">URL</option>
            </select>
          </div>
          <div class="col-md-1 d-grid">
            <button onclick="adicionarItemNaLista()" class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>

        <!-- Alerta -->
        <div id="alerta_item" class="alert alert-danger d-none py-2">
          <span id="alerta_item_msg"></span>
        </div>

        <!-- Tabela de Itens -->
        <div class="table-responsive mt-3">
          <table class="table table-sm align-middle">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Tipo</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela_itens"></tbody>
          </table>
        </div>
        <div id="tabela_vazia" class="text-center text-muted small">Nenhum item adicionado</div>

        <!-- Editar Item -->
        <div id="edit_row_container" class="d-none mt-3 border rounded p-3 bg-light">
          <div class="row g-2">
            <div class="col-md-4"><input type="text" id="edit_nome" class="form-control"></div>
            <div class="col-md-4"><input type="text" id="edit_desc" class="form-control"></div>
            <div class="col-md-3">
              <select id="edit_tipo" class="form-select">
                <option value="text">Texto</option>
                <option value="long_text">Texto longo</option>
                <option value="file">Arquivo</option>
                <option value="image">Imagem</option>
                <option value="url">URL</option>
              </select>
            </div>
            <div class="col-md-1 d-flex gap-1">
              <button onclick="confirmarEdicao()" class="btn btn-success btn-sm w-100"><i class="fa-solid fa-check"></i></button>
              <button onclick="cancelarEdicao()" class="btn btn-secondary btn-sm w-100"><i class="fa-solid fa-xmark"></i></button>
            </div>
          </div>
        </div>

        <!-- Rodapé -->
        <div class="d-flex justify-content-between align-items-center mt-4">
          <small id="contador_itens" class="text-muted">0 item(s)</small>
          <button onclick="salvarChecklistCompleto()" class="btn btn-primary">Salvar checklist</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/create_checklist.js"></script>
</body>
</html>
